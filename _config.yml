description: The Future of Business Systems Lives Here.
theme: minima
markdown: kramdown
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
sass:
  style: compressed
defaults:
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
      seo:
        type: "website"
        name: "BusiSoft Studios"
        description: "Unified business systems architecture integrating creative, automation, and data intelligence."
