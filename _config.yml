# Site Settings
title: "BusiSoft Studios"
description: "Unified business systems architecture integrating creative, automation, and data intelligence."
url: "https://github.io"
baseurl: ""

# Build Settings
theme: minima
markdown: kramdown

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Sass Compilation
sass:
  style: compressed
